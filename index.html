<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium Brettspiel Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overscroll-behavior-y: none; 
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        .ios-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .ios-glass-heavy {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
        }
        
        .ios-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .ios-glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .ios-glass-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 8s infinite ease-in-out;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        
        @keyframes pulse-urgent {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px rgba(239, 68, 68, 0); color: #f8fafc; }
            50% { transform: scale(1.05); text-shadow: 0 0 30px rgba(239, 68, 68, 0.9); color: #ef4444; }
        }
        .time-urgent {
            animation: pulse-urgent 1s infinite !important;
        }
        
        @keyframes flash-alarm-border {
            0%, 100% { background-color: rgba(15, 23, 42, 0); box-shadow: inset 0 0 0 0px rgba(239, 68, 68, 0); }
            50% { background-color: rgba(153, 27, 27, 0.4); box-shadow: inset 0 0 0 5px rgba(239, 68, 68, 1); }
        }
        .alarm-active {
            animation: flash-alarm-border 0.6s infinite !important;
        }

        #bg-progress-bar {
            will-change: height, background-position;
            background-image: linear-gradient(180deg, rgba(16, 185, 129, 0.1), var(--dynamic-color, rgba(139, 92, 246, 0.5)), rgba(16, 185, 129, 0.1));
            background-size: 100% 200%;
            animation: bg-shift 4s ease infinite;
        }

        @keyframes bg-shift {
            0% { background-position: 50% 0%; }
            50% { background-position: 50% 100%; }
            100% { background-position: 50% 0%; }
        }

        .animate-gradient-xy {
            background-size: 200% 200%;
            animation: gradient-xy 3s ease infinite;
        }

        @keyframes gradient-xy {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #stop1 { animation: stop1-color 4s alternate infinite ease-in-out; }
        #stop2 { animation: stop2-color 4s alternate infinite ease-in-out; }
        @keyframes stop1-color {
            0% { stop-color: #10b981; }
            100% { stop-color: #34d399; }
        }
        @keyframes stop2-color {
            0% { stop-color: #8b5cf6; }
            100% { stop-color: #a78bfa; }
        }
        
        .timer-text-container {
            container-type: inline-size;
        }
        .timer-text {
            font-size: 25cqi;
        }
    </style>
</head>
<body class="w-screen h-[100dvh] flex flex-col items-center justify-center p-2 sm:p-4 overflow-hidden relative">

    <div class="fixed inset-0 z-[-3] bg-slate-900 overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-violet-600/60 blur-[80px] animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-emerald-500/50 blur-[90px] animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[70vw] h-[70vw] rounded-full bg-teal-500/50 blur-[80px] animate-blob animation-delay-4000"></div>
    </div>

    <!-- Visueller Puls für den Herzschlag-Modus -->
    <div id="heartbeat-overlay" class="fixed inset-0 z-[-2] bg-red-600 opacity-0 pointer-events-none transition-opacity duration-[150ms] ease-out"></div>

    <div id="alarm-overlay" class="fixed inset-0 z-50 hidden cursor-pointer" title="Zum Stoppen tippen"></div>

    <div id="bg-progress-bar" class="fixed bottom-0 left-0 w-full z-[-1]" style="height: 0%;"></div>

    <main class="w-full max-w-7xl mx-auto flex flex-col landscape:flex-row items-center justify-center landscape:justify-between z-10 relative h-full gap-4 landscape:gap-8 landscape:px-8">
        
        <!-- Timer Display -->
        <div class="relative w-[85vw] max-w-[400px] landscape:w-auto landscape:h-[95dvh] landscape:max-w-[95dvh] aspect-square flex-shrink-0 flex items-center justify-center timer-text-container transition-all">
            
            <div class="absolute inset-[4%] rounded-full ios-glass z-0"></div>

            <svg class="absolute inset-0 w-full h-full transform -rotate-90 z-10" viewBox="0 0 350 350">
                <defs>
                    <linearGradient id="circle-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop id="stop1" offset="0%" stop-color="#10b981" />
                        <stop id="stop2" offset="100%" stop-color="#8b5cf6" />
                    </linearGradient>
                </defs>
                <circle id="progress-circle" cx="175" cy="175" r="160" stroke="url(#circle-gradient)" stroke-width="12" fill="transparent" 
                        stroke-dasharray="1005.3" stroke-dashoffset="0" stroke-linecap="round"></circle>
            </svg>

            <!-- Text Ebene -->
            <div class="relative z-20 flex flex-col items-center mt-[4%] w-full">
                <div id="time-display" class="timer-text leading-none font-mono font-bold text-white tracking-tight drop-shadow-2xl">
                    05:00
                </div>
                <div id="status-text" class="text-violet-300 font-medium mt-2 uppercase tracking-widest" style="font-size: 5cqi;">
                    Bereit
                </div>
            </div>
        </div>

        <!-- Kontroll-Bereich -->
        <div class="flex flex-col items-center w-full max-w-sm landscape:w-[280px] landscape:flex-shrink-0 z-20">
            
            <div id="setup-controls" class="w-full transition-opacity duration-300">
                <div class="flex gap-4 w-full justify-center mb-4">
                    <div class="flex flex-col items-center flex-1">
                        <span class="text-[10px] text-slate-300 mb-1 uppercase tracking-wider font-semibold opacity-70">Minuten</span>
                        <div class="flex items-center w-full justify-between bg-black/20 p-1 rounded-2xl shadow-inner border border-white/5">
                            <button id="btn-sub-min" class="w-10 h-10 ios-glass-btn rounded-xl flex items-center justify-center text-xl font-bold text-white">-</button>
                            <span id="ui-min-val" class="font-mono text-2xl font-bold text-white">05</span>
                            <button id="btn-add-min" class="w-10 h-10 ios-glass-btn rounded-xl flex items-center justify-center text-xl font-bold text-white">+</button>
                        </div>
                    </div>

                    <div class="flex flex-col items-center flex-1">
                        <span class="text-[10px] text-slate-300 mb-1 uppercase tracking-wider font-semibold opacity-70">Sekunden</span>
                        <div class="flex items-center w-full justify-between bg-black/20 p-1 rounded-2xl shadow-inner border border-white/5">
                            <button id="btn-sub-sec" class="w-10 h-10 ios-glass-btn rounded-xl flex items-center justify-center text-xl font-bold text-white">-</button>
                            <span id="ui-sec-val" class="font-mono text-2xl font-bold text-white">00</span>
                            <button id="btn-add-sec" class="w-10 h-10 ios-glass-btn rounded-xl flex items-center justify-center text-xl font-bold text-white">+</button>
                        </div>
                    </div>
                </div>

                <div class="flex gap-2 w-full justify-center text-xs font-semibold mb-6">
                    <button data-mins="1" class="btn-quick-select flex-1 py-2.5 ios-glass-btn text-white rounded-xl">1 Min</button>
                    <button data-mins="3" class="btn-quick-select flex-1 py-2.5 ios-glass-btn text-white rounded-xl">3 Min</button>
                    <button data-mins="5" class="btn-quick-select flex-1 py-2.5 ios-glass-btn text-white rounded-xl">5 Min</button>
                </div>
            </div>

            <!-- Haupt-Aktionsbuttons -->
            <div class="flex gap-5 items-center justify-center w-full">
                <button id="btn-reset" class="w-14 h-14 rounded-full ios-glass-btn flex items-center justify-center text-white" title="Zurücksetzen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
                
                <button id="btn-play-pause" class="w-20 h-20 landscape:w-16 landscape:h-16 rounded-full ios-glass-btn border-white/30 animate-gradient-xy flex items-center justify-center text-white shadow-[0_0_30px_rgba(139,92,246,0.3)] relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-tr from-emerald-500/80 via-teal-500/80 to-violet-600/80 z-0"></div>
                    <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="ml-1 z-10 landscape:w-8 landscape:h-8"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="hidden z-10 landscape:w-8 landscape:h-8"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                
                <button id="btn-settings" class="w-14 h-14 rounded-full ios-glass-btn flex items-center justify-center text-white" title="Einstellungen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                </button>
            </div>
        </div>

        <!-- Settings Panel -->
        <div id="settings-panel" class="absolute inset-x-0 bottom-4 mx-auto w-full max-w-md max-h-[85dvh] overflow-y-auto hide-scrollbar ios-glass-heavy rounded-3xl p-6 transition-all duration-300 hidden opacity-0 z-50">
            <h2 class="text-xl font-semibold mb-5 pb-3 border-b border-white/10 text-white">
                Einstellungen
            </h2>

            <div class="flex items-center justify-between mb-4 pb-4 border-b border-white/5">
                <div class="flex flex-col">
                    <span class="text-sm text-slate-200 font-semibold tracking-wide">Haptisches Feedback</span>
                    <span class="text-[10px] text-slate-400">Vibration bei Tönen aktivieren</span>
                </div>
                <button id="toggle-vibration" class="w-12 h-6 rounded-full bg-emerald-500 border border-transparent relative transition-colors duration-300">
                    <div id="toggle-knob" class="w-5 h-5 bg-white rounded-full absolute top-[1px] left-[22px] transition-transform duration-300 shadow-sm"></div>
                </button>
            </div>

            <div class="flex items-center justify-between mb-6 pb-4 border-b border-white/5">
                <div class="flex flex-col">
                    <span class="text-sm text-slate-200 font-semibold tracking-wide">Herzschlag-Modus</span>
                    <span class="text-[10px] text-slate-400">Intensives Pochen in den letzten 60s</span>
                </div>
                <button id="toggle-heartbeat" class="w-12 h-6 rounded-full bg-black/40 border border-transparent relative transition-colors duration-300">
                    <div id="toggle-knob-heartbeat" class="w-5 h-5 bg-white rounded-full absolute top-[1px] left-[2px] transition-transform duration-300 shadow-sm"></div>
                </button>
            </div>
            
            <div class="flex flex-col gap-6">
                <!-- Sound Lists (Kategorisiert durch JS) -->
                <div>
                    <label class="block text-[11px] text-slate-300 uppercase tracking-wider font-semibold">Jede volle Minute</label>
                    <div id="list-sound-min" class="flex flex-col w-full"></div>
                </div>

                <div class="mt-4">
                    <label class="block text-[11px] text-slate-300 uppercase tracking-wider font-semibold">Bei 30 Sekunden</label>
                    <div id="list-sound-30s" class="flex flex-col w-full"></div>
                </div>

                <div class="mt-4">
                    <label class="block text-[11px] text-slate-300 uppercase tracking-wider font-semibold">Letzte 8 Sek. (Tonleiter)</label>
                    <div id="list-sound-8s" class="flex flex-col w-full"></div>
                </div>

                <div class="mt-4">
                    <label class="block text-[11px] text-slate-300 uppercase tracking-wider font-semibold">Alarm (Ende)</label>
                    <div id="list-sound-alarm" class="flex flex-col w-full"></div>
                </div>
            </div>
            
            <div class="mt-8 flex gap-3">
                <button id="btn-cancel-settings" class="flex-1 bg-white/10 hover:bg-white/20 text-white py-3.5 rounded-xl text-sm font-bold transition-all border border-white/20">
                    Abbrechen
                </button>
                <button id="btn-save-settings" class="flex-1 bg-emerald-600/80 hover:bg-emerald-500/80 text-white py-3.5 rounded-xl text-sm font-bold transition-all border border-emerald-400/50 shadow-lg shadow-emerald-900/50">
                    Speichern
                </button>
            </div>
        </div>

    </main>

    <script>
        const timeDisplay = document.getElementById('time-display');
        const statusText = document.getElementById('status-text');
        const btnPlayPause = document.getElementById('btn-play-pause');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const btnReset = document.getElementById('btn-reset');
        const btnSettings = document.getElementById('btn-settings');
        
        const settingsPanel = document.getElementById('settings-panel');
        const btnCancelSettings = document.getElementById('btn-cancel-settings');
        const btnSaveSettings = document.getElementById('btn-save-settings');
        const setupControls = document.getElementById('setup-controls');
        
        const uiMinVal = document.getElementById('ui-min-val');
        const uiSecVal = document.getElementById('ui-sec-val');
        const bgProgressBar = document.getElementById('bg-progress-bar');
        const progressCircle = document.getElementById('progress-circle');
        const alarmOverlay = document.getElementById('alarm-overlay');
        const heartbeatOverlay = document.getElementById('heartbeat-overlay');
        
        const toggleVibrationBtn = document.getElementById('toggle-vibration');
        const toggleKnob = document.getElementById('toggle-knob');
        const toggleHeartbeatBtn = document.getElementById('toggle-heartbeat');
        const toggleKnobHeartbeat = document.getElementById('toggle-knob-heartbeat');

        const CIRCUMFERENCE = 1005.3;

        const btnSubMin = document.getElementById('btn-sub-min');
        const btnAddMin = document.getElementById('btn-add-min');
        const btnSubSec = document.getElementById('btn-sub-sec');
        const btnAddSec = document.getElementById('btn-add-sec');
        const btnsQuickSelect = document.querySelectorAll('.btn-quick-select');

        let totalSeconds = 5 * 60;
        let remainingSeconds = totalSeconds;
        let exactRemainingMs = totalSeconds * 1000;
        let isRunning = false;
        let targetTime = 0;
        let settingsOpen = false;
        let isAlarming = false;
        let alarmLoopId = null; 
        
        // Herzschlag Tracker
        let nextHeartbeatMs = 0;

        // --- SETTINGS STATE ---
        let currentSettings = {
            min: 2,       // Majestätischer Gong
            warn30s: 11,  // Mystisches Pad
            warn8s: 5,    // Marimba (Skaliert am besten auf der Tonleiter)
            alarm: 17,    // Episches Horn
            vibration: true,
            heartbeat: false
        };
        let tempSettings = { ...currentSettings };

        // --- AUDIO ENGINE (Premium Multi-Layer) ---
        let audioCtx = null;
        let activeAudioNodes = [];

        const soundPresets = [
            { category: "System", name: "Kein Ton", layers: [] },
            
            // Organische Instrumente
            { category: "Instrumente", name: "Tibetische Klangschale", layers: [
                { type: "sine", freq: 349.23, dur: 2.0, vol: 0.4 }, // F4
                { type: "sine", freq: 698.46, dur: 1.5, vol: 0.15 }, // F5
                { type: "sine", freq: 1047.69, dur: 1.0, vol: 0.05 }  // F6
            ]},
            { category: "Instrumente", name: "Majestätischer Gong", layers: [
                { type: "sine", freq: 110, dur: 2.5, vol: 0.5, slide: -5 },
                { type: "triangle", freq: 220, dur: 2.0, vol: 0.2, slide: -10 },
                { type: "sine", freq: 275, dur: 1.5, vol: 0.1 } // Schiefer Oberton für Metall-Charakter
            ]},
            { category: "Instrumente", name: "Sanfte Harfe", layers: [
                { type: "triangle", freq: 523.25, dur: 1.0, vol: 0.3 }, // C5
                { type: "sine", freq: 523.25, dur: 1.2, vol: 0.2 }
            ]},
            { category: "Instrumente", name: "Kirchenglocke", layers: [
                { type: "sine", freq: 261.63, dur: 3.0, vol: 0.4 }, // C4
                { type: "sine", freq: 523.25, dur: 2.0, vol: 0.2 }, // C5
                { type: "sine", freq: 622.25, dur: 1.5, vol: 0.15 }, // Eb5 (Moll-Terz für Glocken-Sound)
                { type: "sine", freq: 1046.50, dur: 1.0, vol: 0.1 } // C6
            ]},
            { category: "Instrumente", name: "Marimba", layers: [
                { type: "triangle", freq: 440, dur: 0.2, vol: 0.5 },
                { type: "sine", freq: 880, dur: 0.05, vol: 0.2 }
            ]},
            { category: "Instrumente", name: "Kalimba", layers: [
                { type: "triangle", freq: 659.25, dur: 0.4, vol: 0.4 },
                { type: "sine", freq: 1318.51, dur: 0.1, vol: 0.15 }
            ]},
            { category: "Instrumente", name: "Xylophon", layers: [
                { type: "triangle", freq: 1046.50, dur: 0.15, vol: 0.4 },
                { type: "sine", freq: 2093.00, dur: 0.05, vol: 0.1 }
            ]},
            { category: "Instrumente", name: "Kristall-Glocke", layers: [
                { type: "sine", freq: 1567.98, dur: 1.5, vol: 0.3 }, // G6
                { type: "sine", freq: 3135.96, dur: 0.8, vol: 0.1 }  // G7
            ]},
            
            // Atmosphärisch & Pads
            { category: "Atmosphärisch", name: "Warmer Akkord (Dur)", layers: [
                { type: "sine", freq: 261.63, dur: 1.5, vol: 0.2 }, // C4
                { type: "sine", freq: 329.63, dur: 1.5, vol: 0.2 }, // E4
                { type: "sine", freq: 392.00, dur: 1.5, vol: 0.2 }  // G4
            ]},
            { category: "Atmosphärisch", name: "Melancholischer Akkord", layers: [
                { type: "sine", freq: 261.63, dur: 1.5, vol: 0.2 }, // C4
                { type: "sine", freq: 311.13, dur: 1.5, vol: 0.2 }, // Eb4 (Moll)
                { type: "sine", freq: 392.00, dur: 1.5, vol: 0.2 }  // G4
            ]},
            { category: "Atmosphärisch", name: "Mystisches Pad", layers: [
                { type: "sine", freq: 300, dur: 2.0, vol: 0.3 },
                { type: "sine", freq: 303, dur: 2.0, vol: 0.3 } // Schwebung
            ]},
            { category: "Atmosphärisch", name: "Tiefes Horn", layers: [
                { type: "triangle", freq: 130.81, dur: 1.5, vol: 0.4, slide: -5 }, // C3
                { type: "sawtooth", freq: 130.81, dur: 1.2, vol: 0.1, slide: -5 }
            ]},
            { category: "Atmosphärisch", name: "Pulsierender Bass", layers: [
                { type: "sine", freq: 65.41, dur: 1.5, vol: 0.5 }, // C2
                { type: "sine", freq: 67.00, dur: 1.5, vol: 0.5 } // Schwebung
            ]},
            { category: "Atmosphärisch", name: "Ätherischer Chor", layers: [
                { type: "triangle", freq: 523.25, dur: 2.0, vol: 0.15 },
                { type: "triangle", freq: 659.25, dur: 2.0, vol: 0.15 },
                { type: "sine", freq: 1046.50, dur: 2.0, vol: 0.1 }
            ]},
            { category: "Atmosphärisch", name: "Tiefer Weltraum", layers: [
                { type: "sine", freq: 55.00, dur: 2.5, vol: 0.5 },
                { type: "sine", freq: 880.00, dur: 2.0, vol: 0.05, slide: 50 }
            ]},
            
            // Alarme & Signale
            { category: "Signale", name: "Sanftes Erwachen", layers: [
                { type: "sine", freq: 440, dur: 1.0, vol: 0.2 },
                { type: "sine", freq: 554.37, dur: 1.0, vol: 0.2, slide: 50 },
                { type: "triangle", freq: 659.25, dur: 1.0, vol: 0.2, slide: 100 }
            ]},
            { category: "Signale", name: "Episches Horn", layers: [
                { type: "sawtooth", freq: 110, dur: 1.5, vol: 0.3, slide: -10 },
                { type: "square", freq: 55, dur: 1.5, vol: 0.3 },
                { type: "triangle", freq: 220, dur: 1.5, vol: 0.2 }
            ]},
            { category: "Signale", name: "Sonar-Ping", layers: [
                { type: "sine", freq: 1200, dur: 0.8, vol: 0.4 },
                { type: "sine", freq: 1205, dur: 0.8, vol: 0.4 }, // Beating
                { type: "triangle", freq: 2400, dur: 0.2, vol: 0.1 }
            ]},
            { category: "Signale", name: "Dissonante Warnung", layers: [
                { type: "sawtooth", freq: 440, dur: 0.6, vol: 0.2 },
                { type: "sawtooth", freq: 466.16, dur: 0.6, vol: 0.2 } // Kleine Sekunde (spannungsreich)
            ]},
            
            // Perkussiv (Ideal für Ticks/Sekunden)
            { category: "Perkussiv", name: "Tiefe Pauke", layers: [
                { type: "sine", freq: 120, dur: 0.4, vol: 0.6, slide: -40 },
                { type: "triangle", freq: 60, dur: 0.3, vol: 0.3 }
            ]},
            { category: "Perkussiv", name: "Holz-Klopfer", layers: [
                { type: "triangle", freq: 800, dur: 0.05, vol: 0.4, slide: -200 },
                { type: "sine", freq: 1500, dur: 0.02, vol: 0.2 }
            ]},
            { category: "Perkussiv", name: "Wassertropfen", layers: [
                { type: "sine", freq: 400, dur: 0.15, vol: 0.4, slide: 400 },
                { type: "sine", freq: 800, dur: 0.1, vol: 0.1, slide: 800 }
            ]},
            { category: "Perkussiv", name: "Mechanisches Metronom", layers: [
                { type: "square", freq: 1000, dur: 0.02, vol: 0.1 },
                { type: "triangle", freq: 500, dur: 0.05, vol: 0.2 }
            ]},
            { category: "Perkussiv", name: "Weicher Herzschlag", layers: [
                { type: "sine", freq: 60, dur: 0.2, vol: 0.6, slide: -20 },
                { type: "sine", freq: 80, dur: 0.1, vol: 0.2 }
            ]}
        ];

        function renderSoundLists() {
            const categoriesUI = [
                { id: 'min', key: 'min' },
                { id: '30s', key: 'warn30s' },
                { id: '8s', key: 'warn8s' },
                { id: 'alarm', key: 'alarm' }
            ];

            const groupedPresets = {};
            soundPresets.forEach((p, index) => {
                if (!groupedPresets[p.category]) groupedPresets[p.category] = [];
                groupedPresets[p.category].push({ ...p, originalIndex: index });
            });

            categoriesUI.forEach(cat => {
                const container = document.getElementById(`list-sound-${cat.id}`);
                container.innerHTML = '';

                Object.keys(groupedPresets).forEach(categoryName => {
                    const catHeader = document.createElement('div');
                    catHeader.className = "w-full mt-3 mb-1.5 text-[9px] text-emerald-400/80 font-bold uppercase tracking-widest";
                    catHeader.textContent = categoryName;
                    container.appendChild(catHeader);

                    const chipContainer = document.createElement('div');
                    chipContainer.className = "flex flex-wrap gap-2 w-full mb-1";

                    groupedPresets[categoryName].forEach(p => {
                        const btn = document.createElement('button');
                        const isActive = tempSettings[cat.key] === p.originalIndex;
                        
                        btn.className = `px-3 py-1.5 rounded-lg text-[11px] font-semibold transition-all border ${
                            isActive 
                            ? 'bg-emerald-500/80 border-emerald-400 text-white shadow-[0_0_15px_rgba(16,185,129,0.4)]' 
                            : 'ios-glass-btn border-white/10 text-slate-300 hover:text-white'
                        }`;
                        btn.textContent = p.name;
                        
                        btn.onclick = () => {
                            tempSettings[cat.key] = p.originalIndex;
                            renderSoundLists(); 
                            
                            if (cat.id === '8s') {
                                playSynthPreset(p.originalIndex, 1);
                                setTimeout(() => playSynthPreset(p.originalIndex, 1.125), 250);
                                setTimeout(() => playSynthPreset(p.originalIndex, 1.25), 500);
                            } else if (cat.id === 'alarm') {
                                playSynthPreset(p.originalIndex, 1, null, true);
                            } else {
                                playSynthPreset(p.originalIndex);
                            }

                            if (tempSettings.vibration && navigator.vibrate) {
                                navigator.vibrate(50);
                            }
                        };
                        chipContainer.appendChild(btn);
                    });
                    container.appendChild(chipContainer);
                });
            });

            // UI für Toggle-Buttons aktualisieren
            if (tempSettings.vibration) {
                toggleVibrationBtn.classList.replace('bg-black/40', 'bg-emerald-500');
                toggleVibrationBtn.classList.replace('border-white/10', 'border-transparent');
                toggleKnob.classList.replace('left-[2px]', 'left-[22px]');
            } else {
                toggleVibrationBtn.classList.replace('bg-emerald-500', 'bg-black/40');
                toggleVibrationBtn.classList.replace('border-transparent', 'border-white/10');
                toggleKnob.classList.replace('left-[22px]', 'left-[2px]');
            }

            if (tempSettings.heartbeat) {
                toggleHeartbeatBtn.classList.replace('bg-black/40', 'bg-red-500');
                toggleHeartbeatBtn.classList.replace('border-white/10', 'border-transparent');
                toggleKnobHeartbeat.classList.replace('left-[2px]', 'left-[22px]');
            } else {
                toggleHeartbeatBtn.classList.replace('bg-red-500', 'bg-black/40');
                toggleHeartbeatBtn.classList.replace('border-transparent', 'border-white/10');
                toggleKnobHeartbeat.classList.replace('left-[22px]', 'left-[2px]');
            }
        }

        toggleVibrationBtn.addEventListener('click', () => {
            tempSettings.vibration = !tempSettings.vibration;
            renderSoundLists();
            if (tempSettings.vibration && navigator.vibrate) navigator.vibrate(50);
        });

        toggleHeartbeatBtn.addEventListener('click', () => {
            tempSettings.heartbeat = !tempSettings.heartbeat;
            renderSoundLists();
            if (tempSettings.heartbeat && tempSettings.vibration && navigator.vibrate) navigator.vibrate(50);
        });

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSynthPreset(index, freqMultiplier = 1, forceDur = null, isAlarm = false) {
            initAudio();
            const p = soundPresets[index];
            if (!p || !p.layers || p.layers.length === 0) return;

            const repetitions = isAlarm ? 4 : 1;
            const maxDur = Math.max(...p.layers.map(l => l.dur));
            const gap = isAlarm ? (maxDur < 0.2 ? 0.2 : maxDur + 0.1) : 0;

            for (let i = 0; i < repetitions; i++) {
                const startTime = audioCtx.currentTime + (i * gap);

                p.layers.forEach(layer => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = layer.type;
                    const baseFreq = layer.freq * freqMultiplier;
                    
                    osc.frequency.setValueAtTime(baseFreq, startTime);
                    if (layer.slide) {
                        osc.frequency.linearRampToValueAtTime(baseFreq + layer.slide, startTime + layer.dur);
                    }
                    
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(layer.vol, startTime + 0.005);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + (forceDur || layer.dur));

                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.start(startTime);
                    osc.stop(startTime + (forceDur || layer.dur));

                    activeAudioNodes.push(osc);
                    osc.onended = () => {
                        activeAudioNodes = activeAudioNodes.filter(n => n !== osc);
                    };
                });
            }
        }

        function triggerHeartbeatPulse() {
            // Finde dynamisch den Index für "Weicher Herzschlag"
            const heartbeatPresetIndex = soundPresets.findIndex(p => p.name === "Weicher Herzschlag");
            if (heartbeatPresetIndex !== -1) playSynthPreset(heartbeatPresetIndex);
            
            // Leichte Vibration
            if (currentSettings.vibration && navigator.vibrate) navigator.vibrate(30);

            // Visueller Roter Flash
            heartbeatOverlay.style.opacity = exactRemainingMs <= 10000 ? '0.3' : '0.15';
            setTimeout(() => {
                heartbeatOverlay.style.opacity = '0';
            }, 150);
        }

        function stopAllAudio() {
            activeAudioNodes.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            activeAudioNodes = [];
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return {
                str: `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`,
                m: m.toString().padStart(2, '0'),
                s: s.toString().padStart(2, '0')
            };
        }

        function updateVisuals(exactSecondsLeft) {
            if (totalSeconds > 0) {
                const fraction = exactSecondsLeft / totalSeconds;
                const progress = Math.max(0, Math.min(1, 1 - fraction));
                
                const r = Math.round(16 + (139 - 16) * progress);
                const g = Math.round(185 + (92 - 185) * progress);
                const b = Math.round(129 + (246 - 129) * progress);

                bgProgressBar.style.height = `${progress * 100}%`;
                bgProgressBar.style.setProperty('--dynamic-color', `rgba(${r}, ${g}, ${b}, 0.5)`);

                const offset = CIRCUMFERENCE - (fraction * CIRCUMFERENCE);
                progressCircle.style.strokeDashoffset = offset;
            } else {
                bgProgressBar.style.height = `0%`;
                progressCircle.style.strokeDashoffset = CIRCUMFERENCE;
            }
        }

        function handleSecondTick(currentSecond) {
            remainingSeconds = currentSecond;
            
            const t = formatTime(remainingSeconds);
            timeDisplay.textContent = t.str;
            uiMinVal.textContent = t.m;
            uiSecVal.textContent = t.s;

            timeDisplay.classList.remove('time-urgent');
            if (remainingSeconds === 0) {
                timeDisplay.classList.remove('text-white');
                timeDisplay.classList.add('text-red-400');
            } else if (remainingSeconds <= 8 && totalSeconds > 8) {
                timeDisplay.classList.remove('text-white', 'text-red-400');
                timeDisplay.classList.add('time-urgent');
            } else {
                timeDisplay.classList.remove('text-red-400');
                timeDisplay.classList.add('text-white');
            }

            if (remainingSeconds % 60 === 0 && remainingSeconds !== totalSeconds && remainingSeconds > 0) {
                playSynthPreset(currentSettings.min);
                if (currentSettings.vibration && navigator.vibrate) navigator.vibrate(100);
            } else if (remainingSeconds === 30) {
                playSynthPreset(currentSettings.warn30s);
                if (currentSettings.vibration && navigator.vibrate) navigator.vibrate(200);
            } else if (remainingSeconds <= 8 && remainingSeconds > 0) {
                const step = 8 - remainingSeconds; 
                const majorScale = [1, 1.125, 1.25, 1.333, 1.5, 1.666, 1.875, 2];
                playSynthPreset(currentSettings.warn8s, majorScale[step]);
                if (currentSettings.vibration && navigator.vibrate) navigator.vibrate(50);
            }
        }

        function timerFrame() {
            if (!isRunning) return;
            
            exactRemainingMs = targetTime - Date.now();

            if (exactRemainingMs <= 0) {
                exactRemainingMs = 0;
                handleSecondTick(0);
                updateVisuals(0);
                timerComplete();
                return;
            }

            const currentSecond = Math.ceil(exactRemainingMs / 1000);
            if (currentSecond !== remainingSeconds) {
                handleSecondTick(currentSecond);
            }

            // Herzschlag-Logik während Frame-Updates
            if (currentSettings.heartbeat && exactRemainingMs <= 60000 && exactRemainingMs > 0) {
                const now = Date.now();
                if (now >= nextHeartbeatMs) {
                    triggerHeartbeatPulse();
                    
                    // Intervalle auf Basis der verbleibenden Zeit
                    let interval = 1000;
                    if (exactRemainingMs <= 10000) interval = 333; // Panik (3x pro Sekunde)
                    else if (exactRemainingMs <= 30000) interval = 500; // Intensiv (2x pro Sekunde)
                    
                    nextHeartbeatMs = now + interval;
                }
            }

            updateVisuals(exactRemainingMs / 1000);
            requestAnimationFrame(timerFrame);
        }

        function triggerEndlessAlarm() {
            if (!isAlarming) return;
            
            playSynthPreset(currentSettings.alarm, 1, null, true);
            if (currentSettings.vibration && navigator.vibrate) {
                navigator.vibrate([400, 200, 400, 200]);
            }
            
            const p = soundPresets[currentSettings.alarm];
            if (p && p.layers && p.layers.length > 0) {
                const maxDur = Math.max(...p.layers.map(l => l.dur));
                const gap = maxDur < 0.2 ? 0.2 : maxDur + 0.1;
                const clusterDurationMs = (4 * gap * 1000) + 600; 
                alarmLoopId = setTimeout(triggerEndlessAlarm, clusterDurationMs);
            } else {
                alarmLoopId = setTimeout(triggerEndlessAlarm, 1000);
            }
        }

        function timerComplete() {
            isRunning = false;
            isAlarming = true;
            iconPlay.classList.remove('hidden');
            iconPause.classList.add('hidden');
            
            setupControls.classList.remove('hidden');
            btnReset.classList.remove('hidden');
            btnSettings.classList.remove('hidden');
            
            statusText.textContent = "Tippen zum Stoppen!";
            statusText.classList.replace('text-emerald-300', 'text-red-400');
            statusText.classList.replace('text-violet-300', 'text-red-400');
            
            triggerEndlessAlarm();
            
            alarmOverlay.classList.add('alarm-active');
            alarmOverlay.classList.remove('hidden');
        }

        function stopAlarm() {
            if (!isAlarming) return;
            isAlarming = false;
            alarmOverlay.classList.remove('alarm-active');
            alarmOverlay.classList.add('hidden');
            nextHeartbeatMs = 0; // Setzt den Tracker für den Herzschlag zurück
            
            clearTimeout(alarmLoopId); 
            stopAllAudio(); 
            resetTimer(); 
        }

        alarmOverlay.addEventListener('click', stopAlarm);

        function startTimer() {
            if (exactRemainingMs <= 0) return;
            initAudio(); 
            isRunning = true;
            targetTime = Date.now() + exactRemainingMs;
            nextHeartbeatMs = 0; // Trigger immediately when starting under 60s
            
            iconPlay.classList.add('hidden');
            iconPause.classList.remove('hidden');
            statusText.textContent = "Läuft...";
            statusText.classList.replace('text-red-400', 'text-emerald-300');
            statusText.classList.replace('text-violet-300', 'text-emerald-300');
            
            setupControls.classList.add('hidden');
            btnReset.classList.add('hidden');
            btnSettings.classList.add('hidden');
            
            requestAnimationFrame(timerFrame);
        }

        function pauseTimer() {
            isRunning = false;
            iconPlay.classList.remove('hidden');
            iconPause.classList.add('hidden');
            nextHeartbeatMs = 0; 
            
            setupControls.classList.remove('hidden');
            btnReset.classList.remove('hidden');
            btnSettings.classList.remove('hidden');
            
            if (exactRemainingMs > 0) {
                statusText.textContent = "Pausiert";
                statusText.classList.replace('text-emerald-300', 'text-violet-300');
            }
        }

        function toggleTimer() {
            if (isRunning) pauseTimer();
            else startTimer();
        }

        function resetTimer() {
            pauseTimer();
            exactRemainingMs = totalSeconds * 1000;
            remainingSeconds = totalSeconds;
            nextHeartbeatMs = 0;
            statusText.textContent = "Bereit";
            statusText.classList.replace('text-red-400', 'text-violet-300');
            statusText.classList.replace('text-emerald-300', 'text-violet-300');
            
            handleSecondTick(totalSeconds);
            updateVisuals(totalSeconds);
        }

        function adjustTime(seconds) {
            let newTotal = totalSeconds + seconds;
            if (newTotal < 1) newTotal = 1;
            if (newTotal > 3600) newTotal = 3600; 
            
            totalSeconds = newTotal;
            exactRemainingMs = totalSeconds * 1000;
            remainingSeconds = totalSeconds;
            nextHeartbeatMs = 0;
            
            if (isRunning) {
                targetTime = Date.now() + exactRemainingMs;
            } else {
                handleSecondTick(totalSeconds);
                updateVisuals(totalSeconds);
            }
        }

        btnSubMin.addEventListener('click', () => adjustTime(-60));
        btnAddMin.addEventListener('click', () => adjustTime(60));
        
        btnSubSec.addEventListener('click', () => adjustTime(-5));
        btnAddSec.addEventListener('click', () => adjustTime(5));

        btnsQuickSelect.forEach(btn => {
            btn.addEventListener('click', (e) => {
                pauseTimer();
                const mins = parseInt(e.target.dataset.mins);
                totalSeconds = mins * 60;
                exactRemainingMs = totalSeconds * 1000;
                remainingSeconds = totalSeconds;
                
                handleSecondTick(totalSeconds);
                updateVisuals(totalSeconds);
                
                statusText.textContent = "Bereit";
                statusText.classList.replace('text-red-400', 'text-violet-300');
                statusText.classList.replace('text-emerald-300', 'text-violet-300');
            });
        });

        // Settings Logic (Save & Cancel)
        btnSettings.addEventListener('click', () => {
            tempSettings = { ...currentSettings };
            renderSoundLists();
            
            settingsPanel.classList.remove('hidden');
            setTimeout(() => {
                settingsPanel.classList.remove('opacity-0');
                settingsPanel.classList.add('opacity-100');
            }, 10);
        });

        function closeSettings() {
            stopAllAudio();
            settingsPanel.classList.remove('opacity-100');
            settingsPanel.classList.add('opacity-0');
            setTimeout(() => {
                settingsPanel.classList.add('hidden');
            }, 300);
        }

        btnCancelSettings.addEventListener('click', closeSettings);
        
        btnSaveSettings.addEventListener('click', () => {
            currentSettings = { ...tempSettings };
            closeSettings();
        });

        btnPlayPause.addEventListener('click', toggleTimer);
        btnReset.addEventListener('click', resetTimer);

        document.body.addEventListener('click', initAudio, { once: true });

        document.body.addEventListener('click', (e) => {
            if (isAlarming) {
                e.preventDefault();
                e.stopPropagation();
                stopAlarm();
            }
        }, { capture: true });

        handleSecondTick(totalSeconds);
        updateVisuals(totalSeconds);

    </script>
</body>
</html>
