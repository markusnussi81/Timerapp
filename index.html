<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Zoomen streng verboten, native App-Feeling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moderner Brettspiel Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
            /* Verhindert Pull-to-Refresh und Bouncen auf iOS */
            overscroll-behavior-y: none; 
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Modernes iOS Glassmorphism */
        .ios-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .ios-glass-heavy {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
        }
        
        /* Button Hover/Active States für Glas */
        .ios-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* Einheitlicher, interaktiver Glas-Look für alle Buttons */
        .ios-glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .ios-glass-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Animierter Aurora-Hintergrund (Blobs) */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 8s infinite ease-in-out;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
        
        @keyframes pulse-urgent {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px rgba(239, 68, 68, 0); color: #f8fafc; }
            50% { transform: scale(1.05); text-shadow: 0 0 30px rgba(239, 68, 68, 0.9); color: #ef4444; }
        }
        .time-urgent {
            animation: pulse-urgent 1s infinite !important;
        }
        
        /* Harter roter 5mm Alarm-Rahmen und Overlay */
        @keyframes flash-alarm-border {
            0%, 100% { background-color: rgba(15, 23, 42, 0); box-shadow: inset 0 0 0 0px rgba(239, 68, 68, 0); }
            50% { background-color: rgba(153, 27, 27, 0.4); box-shadow: inset 0 0 0 5px rgba(239, 68, 68, 1); }
        }
        .alarm-active {
            animation: flash-alarm-border 0.6s infinite !important;
        }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1em;
        }

        #bg-progress-bar {
            will-change: height, background-position;
            background-image: linear-gradient(180deg, rgba(16, 185, 129, 0.1), var(--dynamic-color, rgba(139, 92, 246, 0.5)), rgba(16, 185, 129, 0.1));
            background-size: 100% 200%;
            animation: bg-shift 4s ease infinite;
        }

        @keyframes bg-shift {
            0% { background-position: 50% 0%; }
            50% { background-position: 50% 100%; }
            100% { background-position: 50% 0%; }
        }

        .animate-gradient-xy {
            background-size: 200% 200%;
            animation: gradient-xy 3s ease infinite;
        }

        @keyframes gradient-xy {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #stop1 { animation: stop1-color 4s alternate infinite ease-in-out; }
        #stop2 { animation: stop2-color 4s alternate infinite ease-in-out; }
        @keyframes stop1-color {
            0% { stop-color: #10b981; }
            100% { stop-color: #34d399; }
        }
        @keyframes stop2-color {
            0% { stop-color: #8b5cf6; }
            100% { stop-color: #a78bfa; }
        }
        
        /* Skalierung der Schriftgrößen basierend auf Container-Größe für Landscape */
        .timer-text-container {
            container-type: inline-size;
        }
        .timer-text {
            font-size: 25cqi; /* Skaliert perfekt mit dem Kreis */
        }
    </style>
</head>
<body class="w-screen h-[100dvh] flex flex-col items-center justify-center p-2 sm:p-4 overflow-hidden relative">

    <!-- Animierter Aurora-Hintergrund -->
    <div class="fixed inset-0 z-[-3] bg-slate-900 overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-violet-600/60 blur-[80px] animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-emerald-500/50 blur-[90px] animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[70vw] h-[70vw] rounded-full bg-teal-500/50 blur-[80px] animate-blob animation-delay-4000"></div>
    </div>

    <!-- Klick-Fänger für den End-Alarm (Übernimmt auch den harten roten 5mm Rahmen) -->
    <div id="alarm-overlay" class="fixed inset-0 z-50 hidden cursor-pointer" title="Zum Stoppen tippen"></div>

    <!-- Hintergrund Balken Animation (Via JS in 60 FPS kontrolliert) -->
    <div id="bg-progress-bar" class="fixed bottom-0 left-0 w-full z-[-1]" style="height: 0%;"></div>

    <!-- Hauptcontainer: Spalte im Portrait, Reihe im Landscape. Im Landscape verteilen wir Timer und Knöpfe auf die Seiten -->
    <main class="w-full max-w-7xl mx-auto flex flex-col landscape:flex-row items-center justify-center landscape:justify-between z-10 relative h-full gap-4 landscape:gap-8 landscape:px-8">
        
        <!-- Timer Display -->
        <!-- Im Landscape wächst dieser Bereich fast auf die volle Höhe des Bildschirms an (95dvh) -->
        <div class="relative w-[85vw] max-w-[400px] landscape:w-auto landscape:h-[95dvh] landscape:max-w-[95dvh] aspect-square flex-shrink-0 flex items-center justify-center timer-text-container transition-all">
            
            <!-- Die Glas-Scheibe HINTER dem SVG-Kreis, blurrt den aufsteigenden Balken -->
            <div class="absolute inset-[4%] rounded-full ios-glass z-0"></div>

            <svg class="absolute inset-0 w-full h-full transform -rotate-90 z-10" viewBox="0 0 350 350">
                <defs>
                    <linearGradient id="circle-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop id="stop1" offset="0%" stop-color="#10b981" />
                        <stop id="stop2" offset="100%" stop-color="#8b5cf6" />
                    </linearGradient>
                </defs>
                <circle id="progress-circle" cx="175" cy="175" r="160" stroke="url(#circle-gradient)" stroke-width="12" fill="transparent" 
                        stroke-dasharray="1005.3" stroke-dashoffset="0" stroke-linecap="round"></circle>
            </svg>

            <!-- Text Ebene -->
            <div class="relative z-20 flex flex-col items-center mt-[4%] w-full">
                <div id="time-display" class="timer-text leading-none font-mono font-bold text-white tracking-tight drop-shadow-2xl">
                    05:00
                </div>
                <div id="status-text" class="text-violet-300 font-medium mt-2 uppercase tracking-widest" style="font-size: 5cqi;">
                    Bereit
                </div>
            </div>
        </div>

        <!-- Kontroll-Bereich: Wird im Landscape konsequent nach rechts geschoben und ist schmaler -->
        <div class="flex flex-col items-center w-full max-w-sm landscape:w-[280px] landscape:flex-shrink-0 z-20">
            
            <!-- Setup & Quick Select (wird verkleinert im Landscape) -->
            <div id="setup-controls" class="w-full transition-opacity duration-300">
                <div class="flex gap-4 w-full justify-center mb-4">
                    <!-- Minuten -->
                    <div class="flex flex-col items-center flex-1">
                        <span class="text-[10px] text-slate-300 mb-1 uppercase tracking-wider font-semibold opacity-70">Minuten</span>
                        <div class="flex items-center w-full justify-between bg-black/20 p-1 rounded-2xl shadow-inner border border-white/5">
                            <button id="btn-sub-min" class="w-10 h-10 ios-glass-btn rounded-xl flex items-center justify-center text-xl font-bold text-white">-</button>
                            <span id="ui-min-val" class="font-mono text-2xl font-bold text-white">05</span>
                            <button id="btn-add-min" class="w-10 h-10 ios-glass-btn rounded-xl flex items-center justify-center text-xl font-bold text-white">+</button>
                        </div>
                    </div>

                    <!-- Sekunden -->
                    <div class="flex flex-col items-center flex-1">
                        <span class="text-[10px] text-slate-300 mb-1 uppercase tracking-wider font-semibold opacity-70">Sekunden</span>
                        <div class="flex items-center w-full justify-between bg-black/20 p-1 rounded-2xl shadow-inner border border-white/5">
                            <!-- Auf -5 geändert -->
                            <button id="btn-sub-sec" class="w-10 h-10 ios-glass-btn rounded-xl flex items-center justify-center text-xl font-bold text-white">-</button>
                            <span id="ui-sec-val" class="font-mono text-2xl font-bold text-white">00</span>
                            <!-- Auf +5 geändert -->
                            <button id="btn-add-sec" class="w-10 h-10 ios-glass-btn rounded-xl flex items-center justify-center text-xl font-bold text-white">+</button>
                        </div>
                    </div>
                </div>

                <div class="flex gap-2 w-full justify-center text-xs font-semibold mb-6">
                    <button data-mins="1" class="btn-quick-select flex-1 py-2.5 ios-glass-btn text-white rounded-xl">1 Min</button>
                    <button data-mins="3" class="btn-quick-select flex-1 py-2.5 ios-glass-btn text-white rounded-xl">3 Min</button>
                    <button data-mins="5" class="btn-quick-select flex-1 py-2.5 ios-glass-btn text-white rounded-xl">5 Min</button>
                </div>
            </div>

            <!-- Haupt-Aktionsbuttons -->
            <div class="flex gap-5 items-center justify-center w-full">
                <button id="btn-reset" class="w-14 h-14 rounded-full ios-glass-btn flex items-center justify-center text-white" title="Zurücksetzen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
                
                <button id="btn-play-pause" class="w-20 h-20 landscape:w-16 landscape:h-16 rounded-full ios-glass-btn border-white/30 animate-gradient-xy flex items-center justify-center text-white shadow-[0_0_30px_rgba(139,92,246,0.3)] relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-tr from-emerald-500/80 via-teal-500/80 to-violet-600/80 z-0"></div>
                    <!-- Play Icon (Default) -->
                    <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="ml-1 z-10 landscape:w-8 landscape:h-8"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <!-- Pause Icon (Hidden) -->
                    <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="hidden z-10 landscape:w-8 landscape:h-8"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                
                <button id="btn-settings" class="w-14 h-14 rounded-full ios-glass-btn flex items-center justify-center text-white" title="Sound Einstellungen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                </button>
            </div>
        </div>

        <!-- Settings Panel -->
        <div id="settings-panel" class="absolute inset-x-0 bottom-4 mx-auto w-full max-w-sm ios-glass-heavy rounded-3xl p-6 transition-all duration-300 hidden opacity-0 z-50">
            <h2 class="text-xl font-semibold mb-5 border-b border-white/10 pb-3 flex items-center justify-between text-white">
                <span>Audio Einstellungen</span>
                <button id="btn-close-settings" class="text-white hover:text-white p-2 rounded-full ios-glass-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </h2>
            
            <div class="flex flex-col gap-4">
                <!-- Jede Minute -->
                <div>
                    <label class="block text-[11px] text-slate-300 mb-1 uppercase tracking-wider font-semibold">Jede volle Minute</label>
                    <div class="flex gap-2">
                        <select id="input-sound-min" class="flex-grow bg-black/20 text-white text-sm rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-emerald-400 shadow-inner cursor-pointer backdrop-blur-md"></select>
                        <button id="btn-test-min" class="ios-glass-btn text-white px-4 rounded-xl flex justify-center items-center" title="Testen">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </button>
                    </div>
                </div>

                <!-- 30s Warning -->
                <div>
                    <label class="block text-[11px] text-slate-300 mb-1 uppercase tracking-wider font-semibold">Bei 30 Sekunden</label>
                    <div class="flex gap-2">
                        <select id="input-sound-30s" class="flex-grow bg-black/20 text-white text-sm rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-violet-400 shadow-inner cursor-pointer backdrop-blur-md"></select>
                        <button id="btn-test-30s" class="ios-glass-btn text-white px-4 rounded-xl flex justify-center items-center" title="Testen">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </button>
                    </div>
                </div>

                <!-- 8s Warning -->
                <div>
                    <label class="block text-[11px] text-slate-300 mb-1 uppercase tracking-wider font-semibold">Letzte 8 Sek. (Tonleiter)</label>
                    <div class="flex gap-2">
                        <select id="input-sound-8s" class="flex-grow bg-black/20 text-white text-sm rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-emerald-400 shadow-inner cursor-pointer backdrop-blur-md"></select>
                        <button id="btn-test-8s" class="ios-glass-btn text-white px-4 rounded-xl flex justify-center items-center" title="Testen">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Alarm -->
                <div>
                    <label class="block text-[11px] text-slate-300 mb-1 uppercase tracking-wider font-semibold">Alarm (Ende)</label>
                    <div class="flex gap-2">
                        <select id="input-sound-alarm" class="flex-grow bg-black/20 text-white text-sm rounded-xl px-4 py-3 outline-none border border-white/10 focus:border-red-400 shadow-inner cursor-pointer backdrop-blur-md"></select>
                        <button id="btn-test-alarm" class="ios-glass-btn text-white px-4 rounded-xl flex justify-center items-center" title="Testen">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="mt-6">
                <button id="btn-close-settings-bottom" class="w-full ios-glass-btn text-white py-3.5 rounded-xl text-sm font-bold">
                    Fertig
                </button>
            </div>
        </div>

    </main>

    <script>
        // DOM Elements
        const timeDisplay = document.getElementById('time-display');
        const statusText = document.getElementById('status-text');
        
        const btnPlayPause = document.getElementById('btn-play-pause');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const btnReset = document.getElementById('btn-reset');
        const btnSettings = document.getElementById('btn-settings');
        const btnCloseSettings = document.getElementById('btn-close-settings');
        const btnCloseSettingsBottom = document.getElementById('btn-close-settings-bottom');
        
        const btnTest30s = document.getElementById('btn-test-30s');
        const btnTest8s = document.getElementById('btn-test-8s');
        const btnTestAlarm = document.getElementById('btn-test-alarm');
        const btnTestMin = document.getElementById('btn-test-min');
        
        const settingsPanel = document.getElementById('settings-panel');
        const setupControls = document.getElementById('setup-controls');
        
        const uiMinVal = document.getElementById('ui-min-val');
        const uiSecVal = document.getElementById('ui-sec-val');
        
        const select30s = document.getElementById('input-sound-30s');
        const select8s = document.getElementById('input-sound-8s');
        const selectAlarm = document.getElementById('input-sound-alarm');
        const selectMin = document.getElementById('input-sound-min');
        const bgProgressBar = document.getElementById('bg-progress-bar');
        const progressCircle = document.getElementById('progress-circle');
        const alarmOverlay = document.getElementById('alarm-overlay');

        const CIRCUMFERENCE = 1005.3;

        const btnSubMin = document.getElementById('btn-sub-min');
        const btnAddMin = document.getElementById('btn-add-min');
        const btnSubSec = document.getElementById('btn-sub-sec');
        const btnAddSec = document.getElementById('btn-add-sec');
        const btnsQuickSelect = document.querySelectorAll('.btn-quick-select');

        let totalSeconds = 5 * 60;
        let remainingSeconds = totalSeconds;
        let exactRemainingMs = totalSeconds * 1000;
        let isRunning = false;
        let targetTime = 0;
        let settingsOpen = false;
        let isAlarming = false;
        let alarmLoopId = null; 

        // --- AUDIO ENGINE ---
        let audioCtx = null;
        let activeAudioNodes = [];

        const soundPresets = [
            { name: "Kein Ton", type: "sine", freq: 0, dur: 0, vol: 0 },
            { name: "01. Classic Tick", type: "square", freq: 800, dur: 0.05, vol: 0.1 },
            { name: "02. Digital Beep", type: "triangle", freq: 600, dur: 0.1, vol: 0.3 },
            { name: "03. Buzzer", type: "sawtooth", freq: 150, dur: 0.4, vol: 0.4 },
            { name: "04. Pluck", type: "sawtooth", freq: 400, dur: 0.1, vol: 0.2 },
            { name: "05. Laser", type: "sawtooth", freq: 1200, dur: 0.15, vol: 0.2, slide: -800 },
            { name: "06. Chime (Glocke)", type: "sine", freq: 1200, dur: 0.5, vol: 0.4 },
            { name: "07. Retro Coin", type: "square", freq: 1000, dur: 0.15, vol: 0.2, slide: 500 },
            { name: "08. Woodblock", type: "triangle", freq: 800, dur: 0.03, vol: 0.4 },
            { name: "09. Crystal", type: "sine", freq: 2000, dur: 0.3, vol: 0.2 },
            { name: "10. Sci-Fi Sweep", type: "square", freq: 400, dur: 0.2, vol: 0.2, slide: 400 },
            { name: "11. Low Drone", type: "square", freq: 100, dur: 0.4, vol: 0.4 },
            { name: "12. Sharp Click", type: "triangle", freq: 2500, dur: 0.02, vol: 0.2 },
            { name: "13. Arcade", type: "square", freq: 500, dur: 0.15, vol: 0.2, slide: -100 },
            { name: "14. Soft Bell", type: "sine", freq: 600, dur: 0.4, vol: 0.3 },
            { name: "15. Tech Alert", type: "sawtooth", freq: 1500, dur: 0.1, vol: 0.2 },
            { name: "16. Space Drop", type: "sine", freq: 800, dur: 0.2, vol: 0.3, slide: -600 },
            { name: "17. Alien", type: "square", freq: 300, dur: 0.3, vol: 0.2, slide: 600 },
            { name: "18. Warning Sirene", type: "triangle", freq: 700, dur: 0.4, vol: 0.3, slide: 200 },
            { name: "19. Glass Hit", type: "sine", freq: 1800, dur: 0.05, vol: 0.3 },
            { name: "20. Sub Kick", type: "sine", freq: 150, dur: 0.2, vol: 0.5, slide: -100 },
            { name: "21. Organische Glocke", type: "sine", freq: 880, dur: 0.8, vol: 0.3 },
            { name: "22. Sanftes Holz", type: "sine", freq: 400, dur: 0.08, vol: 0.4, slide: -100 }
        ];

        [selectMin, select30s, select8s, selectAlarm].forEach(select => {
            soundPresets.forEach((p, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.textContent = p.name;
                select.appendChild(opt);
            });
        });
        
        selectMin.value = 21; 
        select30s.value = 14; 
        select8s.value = 1;  
        selectAlarm.value = 2; 

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSynthPreset(index, freqMultiplier = 1, forceDur = null, isAlarm = false) {
            initAudio();
            const p = soundPresets[index];
            if (!p || p.freq === 0) return;

            const repetitions = isAlarm ? 4 : 1;
            const gap = isAlarm ? (p.dur < 0.2 ? 0.2 : p.dur + 0.1) : 0;

            for (let i = 0; i < repetitions; i++) {
                const startTime = audioCtx.currentTime + (i * gap);
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = p.type;
                const baseFreq = p.freq * freqMultiplier;
                
                osc.frequency.setValueAtTime(baseFreq, startTime);
                if (p.slide) {
                    osc.frequency.linearRampToValueAtTime(baseFreq + p.slide, startTime + p.dur);
                }
                
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(p.vol, startTime + 0.005);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + (forceDur || p.dur));

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(startTime);
                osc.stop(startTime + (forceDur || p.dur));

                activeAudioNodes.push(osc);
                osc.onended = () => {
                    activeAudioNodes = activeAudioNodes.filter(n => n !== osc);
                };
            }
        }

        function stopAllAudio() {
            activeAudioNodes.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            activeAudioNodes = [];
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return {
                str: `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`,
                m: m.toString().padStart(2, '0'),
                s: s.toString().padStart(2, '0')
            };
        }

        function updateVisuals(exactSecondsLeft) {
            if (totalSeconds > 0) {
                const fraction = exactSecondsLeft / totalSeconds;
                const progress = Math.max(0, Math.min(1, 1 - fraction));
                
                const r = Math.round(16 + (139 - 16) * progress);
                const g = Math.round(185 + (92 - 185) * progress);
                const b = Math.round(129 + (246 - 129) * progress);

                bgProgressBar.style.height = `${progress * 100}%`;
                bgProgressBar.style.setProperty('--dynamic-color', `rgba(${r}, ${g}, ${b}, 0.5)`);

                const offset = CIRCUMFERENCE - (fraction * CIRCUMFERENCE);
                progressCircle.style.strokeDashoffset = offset;
            } else {
                bgProgressBar.style.height = `0%`;
                progressCircle.style.strokeDashoffset = CIRCUMFERENCE;
            }
        }

        function handleSecondTick(currentSecond) {
            remainingSeconds = currentSecond;
            
            const t = formatTime(remainingSeconds);
            timeDisplay.textContent = t.str;
            uiMinVal.textContent = t.m;
            uiSecVal.textContent = t.s;

            timeDisplay.classList.remove('time-urgent');
            if (remainingSeconds === 0) {
                timeDisplay.classList.remove('text-white');
                timeDisplay.classList.add('text-red-400');
            } else if (remainingSeconds <= 8 && totalSeconds > 8) {
                timeDisplay.classList.remove('text-white', 'text-red-400');
                timeDisplay.classList.add('time-urgent');
            } else {
                timeDisplay.classList.remove('text-red-400');
                timeDisplay.classList.add('text-white');
            }

            if (remainingSeconds % 60 === 0 && remainingSeconds !== totalSeconds && remainingSeconds > 0) {
                playSynthPreset(selectMin.value);
            } else if (remainingSeconds === 30) {
                playSynthPreset(select30s.value);
            } else if (remainingSeconds <= 8 && remainingSeconds > 0) {
                const step = 8 - remainingSeconds; 
                const majorScale = [1, 1.125, 1.25, 1.333, 1.5, 1.666, 1.875, 2];
                playSynthPreset(select8s.value, majorScale[step]);
            }
        }

        function timerFrame() {
            if (!isRunning) return;
            
            exactRemainingMs = targetTime - Date.now();

            if (exactRemainingMs <= 0) {
                exactRemainingMs = 0;
                handleSecondTick(0);
                updateVisuals(0);
                timerComplete();
                return;
            }

            const currentSecond = Math.ceil(exactRemainingMs / 1000);
            if (currentSecond !== remainingSeconds) {
                handleSecondTick(currentSecond);
            }

            updateVisuals(exactRemainingMs / 1000);
            requestAnimationFrame(timerFrame);
        }

        function triggerEndlessAlarm() {
            if (!isAlarming) return;
            
            playSynthPreset(selectAlarm.value, 1, null, true);
            
            const p = soundPresets[selectAlarm.value];
            if (p && p.freq > 0) {
                const gap = p.dur < 0.2 ? 0.2 : p.dur + 0.1;
                const clusterDurationMs = (4 * gap * 1000) + 600; 
                alarmLoopId = setTimeout(triggerEndlessAlarm, clusterDurationMs);
            }
        }

        function timerComplete() {
            isRunning = false;
            isAlarming = true;
            iconPlay.classList.remove('hidden');
            iconPause.classList.add('hidden');
            
            setupControls.classList.remove('hidden');
            btnReset.classList.remove('hidden');
            btnSettings.classList.remove('hidden');
            
            statusText.textContent = "Tippen zum Stoppen!";
            statusText.classList.replace('text-emerald-300', 'text-red-400');
            statusText.classList.replace('text-violet-300', 'text-red-400');
            
            triggerEndlessAlarm();
            
            alarmOverlay.classList.add('alarm-active');
            alarmOverlay.classList.remove('hidden');
        }

        function stopAlarm() {
            if (!isAlarming) return;
            isAlarming = false;
            alarmOverlay.classList.remove('alarm-active');
            alarmOverlay.classList.add('hidden');
            
            clearTimeout(alarmLoopId); 
            stopAllAudio(); 
            resetTimer(); 
        }

        alarmOverlay.addEventListener('click', stopAlarm);

        function startTimer() {
            if (exactRemainingMs <= 0) return;
            initAudio(); 
            isRunning = true;
            targetTime = Date.now() + exactRemainingMs;
            
            iconPlay.classList.add('hidden');
            iconPause.classList.remove('hidden');
            statusText.textContent = "Läuft...";
            statusText.classList.replace('text-red-400', 'text-emerald-300');
            statusText.classList.replace('text-violet-300', 'text-emerald-300');
            
            setupControls.classList.add('hidden');
            btnReset.classList.add('hidden');
            btnSettings.classList.add('hidden');
            
            requestAnimationFrame(timerFrame);
        }

        function pauseTimer() {
            isRunning = false;
            iconPlay.classList.remove('hidden');
            iconPause.classList.add('hidden');
            
            setupControls.classList.remove('hidden');
            btnReset.classList.remove('hidden');
            btnSettings.classList.remove('hidden');
            
            if (exactRemainingMs > 0) {
                statusText.textContent = "Pausiert";
                statusText.classList.replace('text-emerald-300', 'text-violet-300');
            }
        }

        function toggleTimer() {
            if (isRunning) pauseTimer();
            else startTimer();
        }

        function resetTimer() {
            pauseTimer();
            exactRemainingMs = totalSeconds * 1000;
            remainingSeconds = totalSeconds;
            statusText.textContent = "Bereit";
            statusText.classList.replace('text-red-400', 'text-violet-300');
            statusText.classList.replace('text-emerald-300', 'text-violet-300');
            
            handleSecondTick(totalSeconds);
            updateVisuals(totalSeconds);
        }

        function adjustTime(seconds) {
            let newTotal = totalSeconds + seconds;
            if (newTotal < 1) newTotal = 1;
            if (newTotal > 3600) newTotal = 3600; 
            
            totalSeconds = newTotal;
            exactRemainingMs = totalSeconds * 1000;
            remainingSeconds = totalSeconds;
            
            if (isRunning) {
                targetTime = Date.now() + exactRemainingMs;
            } else {
                handleSecondTick(totalSeconds);
                updateVisuals(totalSeconds);
            }
        }

        btnSubMin.addEventListener('click', () => adjustTime(-60));
        btnAddMin.addEventListener('click', () => adjustTime(60));
        
        // Exakte 5-Sekunden-Schritte
        btnSubSec.addEventListener('click', () => adjustTime(-5));
        btnAddSec.addEventListener('click', () => adjustTime(5));

        btnsQuickSelect.forEach(btn => {
            btn.addEventListener('click', (e) => {
                pauseTimer();
                const mins = parseInt(e.target.dataset.mins);
                totalSeconds = mins * 60;
                exactRemainingMs = totalSeconds * 1000;
                remainingSeconds = totalSeconds;
                
                handleSecondTick(totalSeconds);
                updateVisuals(totalSeconds);
                
                statusText.textContent = "Bereit";
                statusText.classList.replace('text-red-400', 'text-violet-300');
                statusText.classList.replace('text-emerald-300', 'text-violet-300');
            });
        });

        function toggleSettings() {
            settingsOpen = !settingsOpen;
            if (settingsOpen) {
                settingsPanel.classList.remove('hidden');
                setTimeout(() => {
                    settingsPanel.classList.remove('opacity-0');
                    settingsPanel.classList.add('opacity-100');
                }, 10);
            } else {
                settingsPanel.classList.remove('opacity-100');
                settingsPanel.classList.add('opacity-0');
                setTimeout(() => {
                    settingsPanel.classList.add('hidden');
                }, 300);
            }
        }

        btnPlayPause.addEventListener('click', toggleTimer);
        btnReset.addEventListener('click', resetTimer);
        btnSettings.addEventListener('click', toggleSettings);
        btnCloseSettings.addEventListener('click', toggleSettings);
        btnCloseSettingsBottom.addEventListener('click', toggleSettings);
        
        btnTestMin.addEventListener('click', () => playSynthPreset(selectMin.value));
        btnTest30s.addEventListener('click', () => playSynthPreset(select30s.value));
        btnTest8s.addEventListener('click', () => {
            playSynthPreset(select8s.value, 1);
            setTimeout(() => playSynthPreset(select8s.value, 1.125), 250);
            setTimeout(() => playSynthPreset(select8s.value, 1.25), 500);
        });
        btnTestAlarm.addEventListener('click', () => playSynthPreset(selectAlarm.value, 1, null, true));

        document.body.addEventListener('click', initAudio, { once: true });

        document.body.addEventListener('click', (e) => {
            if (isAlarming) {
                e.preventDefault();
                e.stopPropagation();
                stopAlarm();
            }
        }, { capture: true });

        handleSecondTick(totalSeconds);
        updateVisuals(totalSeconds);

    </script>
</body>
</html>
